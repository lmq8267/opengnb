name: opengnb-build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: '编译opengn源码的分支或版本号，默认主分支master'
        required: true
        default: 'master'
      rel:
        description: '编译完成后是否发布Release'
        required: true
        default: false
        type: boolean
      tag:
        description: '发布Release指定的版本号（留空为提交哈希值）'
        required: false
        default: ''
  
env:
  branch: "${{ github.event.inputs.branch }}"
  tag: "${{ github.event.inputs.tag }}"
  rel: "${{ github.event.inputs.rel }}"
  TZ: Asia/Shanghai
permissions:
  contents: write
  actions: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: aarch64-apple-darwin
          os: macos-latest
          
        - target: x86_64-apple-darwin
          os: macos-latest
          
        - target: x86_64-pc-windows
          os: ubuntu-latest
          URL: x86_64-w64-mingw32
          
        - target: aarch64-linux-musl
          os: ubuntu-latest
          URL: aarch64-linux-musl
          
        - target: x86_64-linux-musl
          os: ubuntu-latest
          URL: x86_64-linux-musl
            
        - target: i686-linux-musl
          os: ubuntu-latest
          URL: i686-linux-musl
        
        - target: armv7-linux-musleabihf
          os: ubuntu-latest
          URL: armv7l-linux-musleabihf

        - target: armv7-linux-musleabi
          os: ubuntu-latest
          URL: armv7m-linux-musleabi
          
        - target: arm-linux-musleabihf
          os: ubuntu-latest
          URL: arm-linux-musleabihf

        - target: arm-linux-musleabi
          os: ubuntu-latest
          URL: arm-linux-musleabi

        - target: mipsel-linux-musl
          os: ubuntu-latest
          URL: mipsel-linux-muslsf

        - target: mips-linux-musl
          os: ubuntu-latest
          URL: mips-linux-muslsf

        - target: mips64-linux-musl
          os: ubuntu-latest
          URL: mips-linux-musl

        - target: s390x-linux-musl
          os: ubuntu-latest
          URL: s390x-linux-musl

        - target: x86_64-freebsd
          os: ubuntu-latest
          arch: x86-64
          version: '14.2'

        - target: x86_64-openbsd
          os: ubuntu-latest
          arch: x86-64
          version: '7.6'

        - target: arm64-freebsd
          os: ubuntu-latest
          arch: arm64
          version: '14.2'

        - target: arm64-openbsd
          os: ubuntu-latest
          arch: arm64
          version: '7.6'

    runs-on: ${{ matrix.os }}
    steps:
     - name: Checkout code
       uses: actions/checkout@v4
       with:
        repository: gnbdev/opengnb
        ref: ${{ env.branch }}
     - name: 下载linux-musl-gcc
       if: ${{ runner.os == 'Linux' && !endsWith(matrix.target, 'openbsd') && !endsWith(matrix.target, 'freebsd') }}
       uses: lmq8267/dl-musl@main
       with:
        target: ${{ matrix.URL }}
        static: true
        gccpath: /tmp
     - name: 编译 macOS
       if: ${{ runner.os == 'macOS' }}
       run: |
         brew install llvm
         export CC=clang
         export CXX=clang++
         make -f Makefile.Darwin install
         file bin/gnb
     - name: 编译 Liunx Windows
       if: ${{ runner.os == 'Linux' && !endsWith(matrix.target, 'openbsd') && !endsWith(matrix.target, 'freebsd') }}
       run: |
         export CC="$CC -static"
         export CXX="$CXX -static"
         if [[ "${{ matrix.target }}" == "x86_64-pc-windows" ]] ; then
            export WINDRES=x86_64-w64-mingw32-windres
            make -f Makefile.mingw_x86_64 install
            $STRIP bin/*
            file bin/gnb.exe
         else
            make -f Makefile.openwrt install
            $STRIP bin/*
            file bin/gnb
         fi
     - name: 编译 FreeBSD
       if: ${{ endsWith(matrix.target, 'freebsd') }}
       uses: cross-platform-actions/action@master
       with:
         operating_system: freebsd
         architecture: ${{ matrix.arch }}
         version: ${{ matrix.version }}
         shell: bash
         memory: 5G
         cpu_count: 4
         run: |
              sudo pkg install -y gmake
              export CC="clang -static"
              export CXX="clang++ -static"
              gmake -f Makefile.freebsd install
              strip bin/*
              file bin/gnb
     - name: 编译 OpenBSD
       if: ${{ endsWith(matrix.target, 'openbsd') }}
       uses: cross-platform-actions/action@master
       with:
         operating_system: openbsd
         architecture: ${{ matrix.arch }}
         version: ${{ matrix.version }}
         shell: bash
         memory: 5G
         cpu_count: 4
         run: |
              sudo pkg_add gmake
              export CC=clang
              export CXX=clang++
              gmake -f Makefile.openbsd install
              strip bin/*
              file bin/gnb
     - uses: actions/upload-artifact@v4
       with:
        name: opengnb-${{ env.branch }}-${{ matrix.target }}
        path: bin/*
     - name: 设置环境变量
       shell: bash
       run: |
          echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          if [ -z "$TAG" ]; then
              echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          fi
          echo "haxi=$(git rev-parse HEAD)" >> $GITHUB_ENV
       env:
        TAG: ${{ env.tag }}
     - name: 发布Release
       uses: softprops/action-gh-release@v2
       with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
           > ### 编译时间 ：${{ env.build_time }} [提交记录](https://github.com/gnbdev/opengnb/tree/${{ env.haxi }})
           
           
           [官方源码](https://github.com/gnbdev/opengnb)
           
          tag_name: ${{env.tag}}
          files: bin/*
  del:
    runs-on: ubuntu-latest
    steps:
      - name: 删除流程记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 0
